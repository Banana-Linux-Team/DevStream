<!DOCTYPE html>
<head>
  <title>DevStream</title>
<style>
  * {
    box-sizing: border-box;
  }
  .logoenome {
    display:flex;
    background-color: rgba(0,0,0,0.7);
    backdrop-filter: blur(35px);
    -webkit-backdrop-filter: blur(35px);
    color: #5b8def;
    align-items: center;
    gap: 1px;
    text-align: center;
    border-radius: 0;
    font-weight: bold;
    cursor: default;
    z-index: 1000;
  }
  header {
	  position: fixed;
	  width: 100%;
	  top: 0;
	  left: 0;
	  z-index: 100;
  }
  .logoenome p {
    color: #5b8def;
    font-weight: bold;
    margin: 0;
  }
  .logoenome p:last-child {
	  margin-left: auto;
	  margin-right: 15px;
  }
  body {
    background-color: rgba(10,10,10,1);
    color: white;
    margin: 0 auto;
    font-family: Inter;
    min-height: 100vh;
    overflow-y: auto;
  }
  button {
    color: #303134;
    border: none;
    border-radius: 0;
    display: flex;
    font-weight: bold;
    align-items: center;
    cursor: pointer;
  }
  button:hover {
    color: #303134;
  }
  .sidebar {
    display: flex;
    flex-direction: column;
    width: 72px;
    min-width: 72px;
    background-color: rgba(0,0,0,0.7);
    height: calc(100vh - 60px);
    align-items: center;
    z-index: 1000;
    top: 82px;
    left: 0;
    border-radius: 0;
    gap: 10px;
    padding: 10px 0;
    position: fixed;
    justify-content: flex-start;
  }
  .sidebardajaneladepostarvideos  {
	  display: flex;
	  flex-direction: column;
	  height: 100%;
	  width: 72px;
	  background-color: rgba(0,0,0,0.3);
	  align-items:center;
	  left: 0;
	  border-radius: 0;
	  top: 0;
	  gap: 10px;
	  padding: 10px 0;
	  position: fixed;
	  justify-content: flex-start;
  }
  .sidebardajaneladepostarvideos button {
	  background: transparent;
	  color: white;
	  padding: 8px 15px;
	  display: flex;
	  flex-direction: column;
	  width: 100%;
	  font-size: 10px;
	  border-radius: 6px;
	  gap: 2px;
  }
  .sidebardajaneladepostarvideos button:hover {
	  background: rgba(30,30,30,1);
  }
  .sidebar button {
    background: transparent;
    color: #5b8def;
    padding: 8px 5px;
    display: flex;
    flex-direction: column;
    height: 56px;
    width: 56px;
    font-size: 10px;
    border-radius: 999px;
  }
  .sidebar button:hover {
    background: rgba(30,30,30,1);
  }
  .sidebar button svg:hover {
	  transform: scale(1.05);
  }
  .sidebar button svg {
	  width: 32px;
	  height: 32px;
  }
  .janeladecriarconta {
    display: none;
    position: fixed;
    top: 82px;
    left: 75px;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 30px;
    border-radius: 0;
    text-align: left;
    width: calc(100% - 72px);
    height: calc(100vh - 82px);
    overflow-y: auto;
    z-index: 1000;
    overflow-y: auto;
    flex-direction: column;
    margin: 0;
  }
  .janeladecriarconta button {
    display: block;
    width: 100%;
    margin: 10px 0;
    background: transparent;
    color: white;
  }
  .janeladecriarconta button:hover {
    background: #444;
  }
  .janelapostarvideos {
    display: none;
    position: fixed;
    top: 82px;
    left: 75px;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 30px;
    border-radius: 0;
    text-align: left;
    width: calc(100% - 72px);
    height: calc(100vh - 82px);
    overflow-y: auto;
    z-index: 1000;
    overflow-y: auto;
    flex-direction: column;
    margin: 0;
  }
  .janelapostarvideos input[type="file"] {
	  position: fixed;
	  left: 0;
	}
	.janelapostarvideos button {
		display: block;
		margin: 0 auto;
	}
  .janelapostarvideos input {
	  display: block;
	  margin: 10px 0;
	  width: 50%;
  }
  .janelapostarvideos textarea {
	  margin: 0;
  }
  #btnSelecionarVideo {
	  margin: 10px 0;
  }
  #btnSelecionarImagem {
	  margin: 10px 0;
  }
  .janelapostarvideos h2 {
	  margin-left: 0;
  }
  .janelapostarvideos::-webkit-scrollbar {
    width: 8px !important;
  }
  .janelapostarvideos::-webkit-scrollbar-track {
    background: #1a1a1a !important;
    border-radius: 4px !important;
  }
  .janelapostarvideos::-webkit-scrollbar-thumb {
    background: #5b8def !important;
    border-radius: 4px !important;
  }
  .janelapostarvideos::-webkit-scrollbar-thumb:hover {
    background: #3ea6ff !important;
  }
  #previewVideo {
    border: 2px solid #5b8def;
  }
  ::-webkit-scrollbar {
    width: 6px !important;
  }
  ::-webkit-scrollbar-thumb {
    background: #5b8def !important;
    border-radius: 4px !important;
    height: 20px !important;
    min-height: 20px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(10,10,10,1) !important;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #3ea6ff !important;
  }
  .janeladecriarconta h2 {
    color: #303134;
    text-align: center;
  }
  .janelapostarvideos button {
    display: block;
    margin: 0 auto;
    background: transparent;
    color: white;
    padding: 5px;
  }
  .janelapostarvideos button:hover {
    background: #444;
  }
  .janelapostarvideos h2 {
    color: white;
  }
  ::selection {
    background-color: #5b8def;
    color: white;
  }
  .Nome {
    background: linear-gradient(to right, #5b8def 50%, #9ab8f5 50%);
    background-clip: text;
    color: transparent;
    -webkit-background-clip: text;
  }
  input {
    outline: none;
    background-color: white;
    border-radius: 10px;
    padding: 10px;
    color: white;
    width: 50%;
    background-color: #000000;
    border: none;
    margin: 10px 0;
    display: block;
  }
  input::placeholder {
    color: white;
  }
  input label {
    color: white;
  }
  .Novosvideos {
    color: #9ab8f5;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px 10px;
    margin-left: 90px;
    margin-top: 70px
  }
  .Novosvideos p {
    grid-column: 1 / -1;
    text-align: left;
    margin-bottom: 10px;
  }
  textarea {
    border-radius: 10px;
    width: 50%;
    background-color: #000000;
    color: white;
    resize: none;
    outline: none;
    border: none;
    display: flex;
    flex-direction: column;
  }
  textarea::placeholder {
    color:white;
  }
  p {
    color:white;
  }
  .Novosvideos {
    text-align: center;
    padding: 10px;
  }
  textarea:focus{
    outline: 1px solid #5b8def;
  }
  input:focus {
    outline: 1px solid #5b8def;
    color: white;
  }
  .carddosvideos {
    color: white;
    border-radius: 10px;
    background: transparent;
    padding: 10px 3px;
    display: grid;
    margin: 5px auto;
    max-width: 300px;
    display: flex;
    transition: transform 0.3s ease;
    cursor: pointer;
    width: 100%;
    word-break: break-word;
  }
  .carddosvideos.azul:hover {
	  background: #5b8def;
	  transform: scale(1.02);
	  color: #ffffff;
  }
  .carddosvideos:hover {
    background-color: rgba(30,30,30,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transform: scale(1.02);
  }
  .logoenome h1 {
    -webkit-text-stroke: 2px #000000;
  }
  .carddosvideos .video-container {
    padding: 0 15px;
    width: 100%;
  }
  .carddosvideos .video-title {
    font-size: 18px;
    margin: 5px 0 2px 0;
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    overflow: hidden;
    max-width: 100%;
    text-align: left;
  }
  .carddosvideos .video-desc {
    color: #FFFFFF;
    font-size: 14px;
    margin: 2px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .carddosvideos .video-user {
    color: #ffffff;
    font-size: 13px;
    margin: 2px 0 5px 0;
    text-align: left;
    font-weight: 500;
  }
  .carddosvideos .video-time {
    color: #FFFFFF;
    font-size: 12px;
    margin: 2px 0 5px 0;
    text-align: left;
  }

  /* ========= PLAYER PERSONALIZADO ========= */
  #janelaplayer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(10,10,10,1);
    z-index: 1000;
    padding: 0;
    margin: 0;
    border: none;
    border-radius: 0;
    overflow-y: auto;
  }

  #logo {
    z-index: 10;
    align-items: center;
    cursor: pointer;
    display: flex;
  }
  .player-header {
	  display: flex;
	  align-items: center;
	  background-color: rgba(0,0,0,0.3);
	  padding: 10px 20px;
	  gap: 1px;
	  position: sticky;
	  top: 0;
	  z-index: 10;
	  backdrop-filter: blur(5px);
	  -webkit-backdrop-filter: blur(5px);
  }
  .player-header.scrolled {
	  background-color: #000000;
	  backdrop-filter: none;
	  -webkit-backdrop-filter: none;
  }
  .player-header svg {
    width: 40px;
    height: 40px;
  }

  .player-header h1 {
    margin: 0;
    font-size: 24px;
    -webkit-text-stroke: 1px #000000;
  }

  .player-header .Nome {
    background: linear-gradient(to right, #5b8def 50%, #9ab8f5 50%);
    background-clip: text;
    color: transparent;
    -webkit-background-clip: text;
  }

  .player-content {
    display: flex;
    gap: 20px;
    padding: 20px;
    min-height: calc(100vh - 70px);
  }

  .player-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .player-sidebar {
    width: 320px;
    min-width: 280px;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    padding-left: 20px;
  }

  .player-sidebar h3 {
    color: #9ab8f5;
    margin: 0 0 15px 0;
    padding-bottom: 10px;
    border-bottom: 1px solid #333;
    font-size: 16px;
  }

  .player-sidebar .card-pequeno {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
    margin-bottom: 5px;
    background: transparent;
  }

  .player-sidebar .card-pequeno:hover {
    background: #2a2a2a;
  }

  .player-sidebar .card-pequeno img {
    width: 120px;
    height: 68px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .player-sidebar .card-pequeno .info {
    flex: 1;
    min-width: 0;
  }

  .player-sidebar .card-pequeno .info .titulo {
    color: white;
    font-size: 13px;
    font-weight: 500;
    margin: 0 0 3px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-sidebar .card-pequeno .info .usuario {
    color: #5b8def;
    font-size: 11px;
    margin: 0;
  }

  .player-sidebar .card-pequeno .info .tempo {
    color: #666;
    font-size: 10px;
    margin: 0;
  }

  /* ========= PLAYER PERSONALIZADO ========= */
  .player-wrapper {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 0;
    overflow: hidden;
    aspect-ratio: 16/9;
    min-height: 350px;
  }

  .player-wrapper video {
    width: 100%;
    height: 100%;
    display: block;
    background: #000;
    border: none;
    outline: none;
    object-fit: cover;
  }
.player-wrapper:fullscreen {
	cursor: none;
	border-radius: 0;
	outline: none;
}
.player-wrapper:fullscreen .progress-bar:hover,
.player-wrapper:fullscreen .player-controls:hover {
	cursor: default;
}
  .player-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 20px 15px 10px 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .player-wrapper:hover .player-controls,
  .player-wrapper.controls-visible .player-controls {
    opacity: 1;
  }

  .controls-top {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
  }

  .controls-top .play-btn {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(10,10,10,0.1);
    color: white;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .controls-top .play-btn:hover {
    background: rgba(255,255,255,0.2);
  }
.play-btn:hover svg polygon {
	fill: #5b8def;
}
.volume-btn:hover svg path {
	fill: #5b8def;
}
.fullscreen-btn:hover svg path {
	fill: #5b8def;
}
  .controls-top .play-btn svg {
    width: 24px;
    height: 24px;
    fill: white;
  }

  .controls-top .time-display {
    color: white;
    font-size: 14px;
    font-family: inter;
    flex-shrink: 0;
    min-width: 100px;
    border-radius: 20px;
    background: rgba(0,0,0,0.2);
    text-align: center;
    padding: 8px;
    border: 1px solid rgba(10,10,10,0.1);
  }

  .controls-top .volume-btn {
    background: rgba(0,0,0,0.2);
    border: none;
    color: white;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    border: 1px solid rgba(10,10,10,0.1);
  }

  .controls-top .volume-btn:hover {
    background: rgba(255,255,255,0.2);
  }

  .controls-top .volume-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .controls-top .fullscreen-btn {
    background: rgba(0,0,0,0.2);
    color: white;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    margin-left: auto;
    border: 1px solid rgba(10,10,10,0.1);
  }

  .controls-top .fullscreen-btn:hover {
    background: rgba(255,255,255,0.2);
  }

  .controls-top .fullscreen-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .progress-bar {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: height 0.2s;
  }

  .progress-bar:hover {
    height: 7px;
  }

  .progress-bar .progress-filled {
    height: 100%;
    background: #5b8def;
    border-radius: 3px;
    width: 0%;
    position: relative;
    transition: width 0.1s linear;
  }

  .progress-bar .progress-filled::after {
    content: '';
    position: absolute;
    right: -6px;
    top: -4px;
    width: 13px;
    height: 13px;
    background: #5b8def;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .progress-bar:hover .progress-filled::after {
    opacity: 1;
  }

  /* ========= INTERAÇÕES DO PLAYER ========= */
  .player-interactions {
    background: #000000;
    border-radius: 20px;
    padding: 15px 20px;
    margin-top: 15px;
    text-align: left;
    width: 100%;
  }

  .player-interactions .video-title {
    color: white;
    font-size: 22px;
    margin: 0 0 10px 0;
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
  }

  .player-interactions .video-desc {
    color: #FFFFFF;
    font-size: 15px;
    margin: 0 0 15px 0;
  }

  .video-actions {
    display: flex;
    gap: 15px;
    justify-content: flex-start;
    margin: 10px 0;
    flex-wrap: wrap;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 20px;
    background: transparent;
    color: #aaa;
    border: none !important;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
  }

  .action-btn:hover {
    background: transparent;
    color: white;
    transform: scale(1.2);
  }

  .action-btn.liked {
    color: #3ea6ff;
  }

  .action-btn.liked svg {
    fill: #3ea6ff;
  }

  .action-btn.disliked {
    color: #3ea6ff;
  }

  .action-btn.disliked svg {
    fill: #3ea6ff;
  }

  .action-btn svg {
    width: 24px;
    height: 24px;
    transition: all 0.3s;
  }

  .action-btn .like-count,
  .action-btn .dislike-count {
    font-size: 14px;
    color: #aaa;
  }

  .action-btn.liked .like-count,
  .action-btn.disliked .dislike-count {
    color: #3ea6ff;
  }

  .share-btn {
    background: transparent;
    border: none !important;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    font-size: 14px;
  }

  .share-btn:hover {
    background: transparent;
    color: white;
    transform: scale(1.2);
  }

  .share-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
  }

  .coracao-svg {
    width: 24px;
    height: 24px;
    cursor: pointer;
    transition: all 0.3s;
    stroke: currentColor;
    fill: currentColor;
    stroke-width: 2;
  }

  .action-btn.liked .coracao-svg {
    fill: #3ea6ff;
    stroke: #3ea6ff;
    transform: scale(1.2);
  }

  .coracao-svg:hover {
    transform: scale(1.2);
  }

  .dislike-svg {
    width: 24px;
    height: 24px;
    cursor: pointer;
    transition: all 0.3s;
    fill: none;
  }

  .dislike-svg path {
    fill: currentColor;
  }

  .action-btn.disliked .dislike-svg {
    fill: #3ea6ff;
    transform: scale(1.2);
  }

  .action-btn.disliked .dislike-svg path {
    fill: #3ea6ff;
  }

  .dislike-svg:hover {
    transform: scale(1.2);
  }

  .comments-section {
    max-width: 800px;
    margin: 20px auto;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 1px solid #333;
    overflow: visible !important;
  }

  .comments-section h3 {
    color: #9ab8f5;
    margin-bottom: 10px;
  }

  .comment-input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    align-items: left;
    overflow: visible !important;
    flex-wrap: nowrap;
  }

  .comment-input-area input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 20px;
    border: 1px solid #555;
    background: #222;
    color: white;
    height: 40px;
    font-size: 14px;
    box-sizing: border-box;
    margin: 0;
    display: block;
    width: auto;
    min-width: 0;
  }

  .comment-input-area button {
    padding: 0 20px;
    border-radius: 20px !important;
    background: #5b8def;
    color: white;
    border: none;
    cursor: pointer;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    min-width: 90px;
    flex-shrink: 0;
    box-sizing: border-box;
    margin: 0;
    transition: transform 0.2s, background 0.2s;
  }

  .comment-input-area button:hover {
    background: #4a7adf !important;
    transform: scale(1.05);
  }

  .comment {
    padding: 10px 0;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 5px;
  }

  .comment .comment-user {
    color: #5b8def;
    font-weight: bold;
  }

  .comment .comment-text {
    color: #ddd;
    flex: 1;
  }

  .comment .comment-time {
    color: #666;
    font-size: 12px;
  }

  .descricaoejanela {
    align-items: flex-start;
    display: flex;
    gap: 10px;
    margin: 0 0 15px 0;
    flex-wrap: wrap;
  }

  .botaodajaneladadescricao:hover {
    color: #3ea6ff;
    text-decoration: underline;
  }

    function tempoDesdePost(dataPost) {
      const agora = new Date();
      const post = new Date(dataPost);
      const diff = Math.floor((agora - post) / 1000);
      
      if (diff < 60) return 'agora mesmo';
      if (diff < 3600) return `há ${Math.floor(diff / 60)} minutos`;
      if (diff < 86400) return `há ${Math.floor(diff / 3600)} horas`;
      if (diff < 2592000) return `há ${Math.floor(diff / 86400)} dias`;
      if (diff < 31536000) return `há ${Math.floor(diff / 2592000)} meses`;
      return `há ${Math.floor(diff / 31536000)} anos`;
    }

    function dataURLtoBlob(dataURL) {
      try {
        const parts = dataURL.split(',');
        const mimeType = parts[0].split(':')[1].split(';')[0];
        const byteString = atob(parts[1]);
        const arrayBuffer = new ArrayBuffer(byteString.length);
        const uint8Array = new Uint8Array(arrayBuffer);
        for (let i = 0; i < byteString.length; i++) {
          uint8Array[i] = byteString.charCodeAt(i);
        }
        return new Blob([arrayBuffer], { type: mimeType });
      } catch (e) {
        console.error('Erro ao converter DataURL para Blob:', e);
        return null;
      }
    }

    function salvarVideos() {
      if (!db) {
        console.log('⏳ Aguardando IndexedDB...');
        setTimeout(salvarVideos, 500);
        return;
      }
      
      const cards = document.querySelectorAll('.carddosvideos:not(#modelodecard)');
      console.log('📊 Total de cards para salvar:', cards.length);
      
      const txGet = db.transaction("vids", "readonly");
      const storeGet = txGet.objectStore("vids");
      const requestGet = storeGet.getAll();
      
      requestGet.onsuccess = (e) => {
        const existingVideos = e.target.result;
        const videoMap = {};
        existingVideos.forEach(v => { videoMap[v.titulo] = v; });
        
        const txClear = db.transaction("vids", "readwrite");
        const storeClear = txClear.objectStore("vids");
        storeClear.clear();
        
        txClear.oncomplete = () => {
          const tx = db.transaction("vids", "readwrite");
          const store = tx.objectStore("vids");
          
          cards.forEach(card => {
            const titulo = card.querySelector('.video-title')?.textContent || 'Sem título';
            const desc = card.querySelector('.video-desc')?.textContent || '';
            const link = card.dataset.link || '';
            const imagem = card.dataset.imagem || '';
            const isLocal = card.dataset.local === 'true';
            const data = card.dataset.data || new Date().toISOString();
            const usuario = card.dataset.usuario || usuarioAtual || 'Anônimo';
            if (link || isLocal) {
              let videoData = {
                id: 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                titulo: titulo,
                desc: desc,
                link: link,
                imagem: imagem,
                local: isLocal,
                data: data,
                usuario: usuario
              };
              
              if (isLocal && videoMap[titulo] && videoMap[titulo].arquivo) {
                videoData.arquivo = videoMap[titulo].arquivo;
                console.log('📹 Preservando arquivo local:', titulo);
              }
              
              store.add(videoData);
              console.log('📹 Salvando no IndexedDB:', titulo);
            }
          });
          
          tx.oncomplete = () => {
            console.log('✅ Vídeos salvos no IndexedDB!');
          };
        };
      };
    }

    function carregarVideos() {

      const store = tx.objectStore("vids");
      const request = store.getAll();
      
      request.onsuccess = (e) => {
        const videos = e.target.result;
        console.log('🔄 Carregando vídeos do IndexedDB:', videos.length);
        
        document.querySelectorAll('.carddosvideos:not(#modelodecard)').forEach(c => c.remove());
        todosOsVideos = [];
        
        if (videos.length === 0) {
          console.log('📭 Nenhum vídeo encontrado');
          setTimeout(popularSidebar, 100);
          return;

        videos.forEach(video => {

    function pesquisarVideos() {
      const termo = document.getElementById('campoPesquisa').value.toLowerCase().trim();
      const tituloPagina = document.getElementById('tituloPagina');
      const container = document.getElementById('conteudoPrincipal');
      
      // Se não tem termo, mostra todos
      if (termo === '') {
        tituloPagina.textContent = 'Todos vídeos';
        todosOsVideos.forEach(v => {
          v.elemento.style.display = 'block';
        });
        // Remove mensagem de "sem resultados" se existir
        const semResultados = container.querySelector('.sem-resultados');
        if (semResultados) semResultados.remove();
        return;
      }
      
      let encontrados = 0;
      todosOsVideos.forEach(v => {
        const match = v.titulo.includes(termo) || 
                      v.desc.includes(termo) || 
                      v.usuario.includes(termo);
        v.elemento.style.display = match ? 'block' : 'none';
        if (match) encontrados++;
      });
      
      // Remove mensagem de "sem resultados" antiga
      const semResultados = container.querySelector('.sem-resultados');
      if (semResultados) semResultados.remove();
      
      if (encontrados === 0) {
        const msg = document.createElement('p');
        msg.className = 'sem-resultados';
        msg.textContent = `🔍 Nenhum vídeo encontrado para "${termo}"`;
        container.appendChild(msg);
        tituloPagina.textContent = `Resultados para: "${termo}"`;
      } else {
        tituloPagina.textContent = `🔍 ${encontrados} resultado(s) para "${termo}"`;
      }
    }

      liberarscrollbody();
    }

    function criarConta() { 
      const nome = document.getElementById('nomedaconta').value.trim();
      const senha = document.getElementById('senhadaconta').value.trim();
     if (nome === "") {
		 alert('Preencha um nome');
		 return;
	 }
	 if (senha === "") {
		 alert('Preencha uma senha');
		 return;
	 }
	 if (senha.length < 4) {
		 alert('Coloque pelo menos 4 caracteres');
		 return;
	 }
	 usuarioAtual = nome;
	 document.getElementById('nomedousuario').textContent = nome;
	 localStorage.setItem('devstream_usuario', nome);
	 localStorage.setItem('devstream_senha_' + nome, senha);
	 document.getElementById('criarconta').style.display = 'none';
	 alert('Bem vindo, ' + nome);
	 fecharjaneladecriarconta();
    }

    // ========== POSTAR VÍDEOS ==========
    document.getElementById('postarvideos').onclick = function() {
      document.getElementById('janeladobotaodepostarvideos').style.display = "block";
      bloquearScrollbody();
    };

    function fecharjaneladobotaodepostarvideos() {
      document.getElementById('janeladobotaodepostarvideos').style.display = "none";
      liberarscrollbody();
    }

    // ========== UPLOAD DE VÍDEO LOCAL ==========
    document.getElementById('btnSelecionarVideo').onclick = function() {
      document.getElementById('arquivovideo').click();
    };

    document.getElementById('btnSelecionarImagem').onclick = function() {
      document.getElementById('arquivoimagem').click();
    };

    document.getElementById('arquivoimagem').onchange = function(e) {
      const arquivo = e.target.files[0];
      if (!arquivo) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        capaVideo = ev.target.result;
        const preview = document.getElementById('previewImagem');
        preview.innerHTML = `<img src="${capaVideo}" style="max-width:100%; max-height:200px; border-radius:10px;">`;
        preview.style.display = "block";
        console.log('🖼️ Imagem carregada');
      };
      reader.readAsDataURL(arquivo);
    };

    document.getElementById('arquivovideo').onchange = function(e) {
      const file = e.target.files[0];
      if (file) {
        videoFile = file;
        const url = URL.createObjectURL(file);
        const video = document.getElementById('videoPreview');
        video.src = url;
        document.getElementById('previewVideo').style.display = 'block';
        document.getElementById('nomeArquivo').textContent = '📹 ' + file.name + ' (' + (file.size / 1024 / 1024).toFixed(2) + ' MB)';
        console.log('📹 Vídeo local carregado:', file.name);
      }
    };

    // ========== PUBLICAR VÍDEO ==========
    document.getElementById('publicarvideo').onclick = function() {
      console.log('🔘 Botão Publicar clicado!');
      
      let nome = document.getElementById('nomedovideo').value.trim();
      let desc = document.getElementById('descrição').value.trim();
      let link = document.getElementById('linkparaovideo').value.trim();
      
      console.log('📝 Dados:', { nome, link, temVideo: !!videoFile, temImagem: !!capaVideo });
      
      if (nome === "") {
        alert("Digite um nome para o vídeo");
        return;
      }
      
      if (!capaVideo) {
        console.log('⚠️ Nenhuma imagem selecionada!');
        alert("⚠️ Você precisa selecionar uma imagem de capa para o vídeo!");
        return;
      }
      
      if (link) {
        console.log('🎬 Publicando vídeo do YouTube com imagem:', link);
        
        if (!link.includes('youtube.com') && !link.includes('youtu.be')) {
          alert("⚠️ Isso não parece ser um link válido do YouTube!\nExemplo: https://www.youtube.com/watch?v=...");
          return;
        }
        
        criarCardVideo(nome, link, desc, capaVideo, new Date().toISOString(), usuarioAtual);
        
        document.getElementById('nomedovideo').value = '';
        document.getElementById('descrição').value = '';
        document.getElementById('linkparaovideo').value = '';
        capaVideo = '';
        document.getElementById('previewImagem').style.display = 'none';
        document.getElementById('previewImagem').innerHTML = '';
        fecharjaneladobotaodepostarvideos();
        alert("✅ Vídeo do YouTube publicado e salvo permanentemente!");
        return;
      }
      
      if (videoFile) {
        console.log('🎬 Publicando vídeo local com imagem:', videoFile.name);
        
        const reader = new FileReader();
        reader.onload = function(e) {
          const videoData = e.target.result;
          criarCardVideoLocal(nome, videoData, desc);
          
          document.getElementById('nomedovideo').value = '';
          document.getElementById('descrição').value = '';
          document.getElementById('linkparaovideo').value = '';
          document.getElementById('arquivovideo').value = '';
          document.getElementById('previewVideo').style.display = 'none';
          videoFile = null;
          capaVideo = '';
          document.getElementById('previewImagem').style.display = 'none';
          document.getElementById('previewImagem').innerHTML = '';
          fecharjaneladobotaodepostarvideos();
          alert("✅ Vídeo local publicado e salvo permanentemente!");
        };
        reader.readAsDataURL(videoFile);
        return;
      }
      
      alert("❌ Coloque um link do YouTube OU selecione um vídeo do computador");
    };

    // ========== ABRIR PLAYER LOCAL ==========
    function abrirPlayerLocal(videoData, titulo, desc) {
      currentTitle = titulo;
      document.title = titulo + " - DevStream";
      
      document.getElementById('janelaplayer').style.display = 'block';
      document.getElementById('titulodovideo').textContent = titulo;
      document.getElementById('descricaodovideo').textContent = desc || 'Sem descrição';
      setTimeout(verificardescricao, 300);
      
      video.src = videoData;
      video.load();
      video.play();
      isPlaying = true;
      updatePlayIcon();
      
      const estado = carregarEstadoVideo(titulo);
      if (estado) {
        liked = estado.liked || false;
        disliked = estado.disliked || false;
        likeCount = estado.likes || 0;
        dislikeCount = estado.dislikes || 0;
      } else {
        liked = false;
        disliked = false;
        likeCount = 0;
        dislikeCount = 0;
      }
      
      document.getElementById('like-count').textContent = likeCount;
      document.getElementById('dislike-count').textContent = dislikeCount;
      document.getElementById('like-btn').classList.toggle('liked', liked);
      document.getElementById('dislike-btn').classList.toggle('disliked', disliked);
      document.getElementById('comments-list').innerHTML = '';
      
      document.body.style.overflow = 'hidden';
      popularSidebar(titulo);
    }

    // ========== FECHAR PLAYER ==========
    function fecharPlayer() {
      document.title = "DevStream";
      if (currentTitle) {
        salvarEstadoVideo(currentTitle, likeCount, dislikeCount, liked, disliked);
      }
      video.pause();
      video.src = '';
      document.getElementById('janelaplayer').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('janelaplayer').style.display === 'block') {
        fecharPlayer();
      }
    });

    // ========== LIKE ==========
    document.getElementById('like-btn').onclick = function() {
      if (!liked) {
        liked = true;
        likeCount++;
        if (disliked) {
          disliked = false;
          dislikeCount--;
          document.getElementById('dislike-count').textContent = dislikeCount;
          document.getElementById('dislike-btn').classList.remove('disliked');
        }
        document.getElementById('like-count').textContent = likeCount;
        this.classList.add('liked');
      } else {
        liked = false;
        likeCount--;
        document.getElementById('like-count').textContent = likeCount;
        this.classList.remove('liked');
      }
      if (currentTitle) {
        salvarEstadoVideo(currentTitle, likeCount, dislikeCount, liked, disliked);
      }
    };

    // ========== DISLIKE ==========
    document.getElementById('dislike-btn').onclick = function() {
      if (!disliked) {
        disliked = true;
        dislikeCount++;
        if (liked) {
          liked = false;
          likeCount--;
          document.getElementById('like-count').textContent = likeCount;
          document.getElementById('like-btn').classList.remove('liked');
        }
        document.getElementById('dislike-count').textContent = dislikeCount;
        this.classList.add('disliked');
      } else {
        disliked = false;
        dislikeCount--;
        document.getElementById('dislike-count').textContent = dislikeCount;
        this.classList.remove('disliked');
      }
      if (currentTitle) {
        salvarEstadoVideo(currentTitle, likeCount, dislikeCount, liked, disliked);
      }
    };

    // ========== COMPARTILHAR ==========
    document.getElementById('share-btn').onclick = function() {
      if (navigator.share) {
        navigator.share({
          title: currentTitle,
          url: window.location.href
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert('Link copiado!');
        }).catch(() => {
          alert('Compartilhe: ' + window.location.href);
        });
      }
    };

    // ========== COMENTÁRIOS ==========
    document.getElementById('comment-submit').onclick = function() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) {
        const commentDiv = document.createElement('div');
        commentDiv.className = 'comment';
        const user = document.getElementById('nomedousuario').textContent || 'Anônimo';
        const time = new Date().toLocaleString();
        commentDiv.innerHTML = `
          <span class="comment-user">${user}</span>
          <span class="comment-text">${text}</span>
          <span class="comment-time">${time}</span>
        `;
        document.getElementById('comments-list').appendChild(commentDiv);
        input.value = '';
      }
    };

    document.getElementById('comment-input').onkeypress = function(e) {
      if (e.key === 'Enter') document.getElementById('comment-submit').click();
    };

    // ========== DESCRIÇÃO ==========
    function verificardescricao() {
      const desc = document.getElementById('descricaodovideo');
      const btn = document.getElementById('btnmaisdescricao');
      if (desc.scrollHeight > desc.clientHeight) {
        btn.style.display = 'block';
      } else {
        btn.style.display = 'none';
      }
    }

    document.getElementById('btnmaisdescricao').onclick = function() {
      const descricao = document.getElementById('descricaodovideo').textContent;
      document.getElementById('descricaocompleta').textContent = descricao;
      document.getElementById('janeladescricao').style.display = 'block';
    };

    function fecharDescricao() {
      document.getElementById('janeladescricao').style.display = 'none';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        fecharDescricao();
      }
    });

    // ========== VOLUME SLIDER ==========
    document.getElementById('volumeBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      const slider = document.querySelector('.volume-slider');
      slider.style.display = slider.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('volumeSlider').addEventListener('input', function(e) {
      video.volume = e.target.value;
      video.muted = false;
    });

    // ========== INICIALIZAR ==========
    window.onload = function() {
      console.log('🚀 DevStream iniciando...');
      
      const usuario = localStorage.getItem('devstream_usuario');
      if (usuario) {
        usuarioAtual = usuario;
        document.getElementById('nomedousuario').textContent = usuario;
        document.getElementById('criarconta').style.display = 'none';
      }
      
      if (db) {
        carregarVideos();
      }
      
      console.log('📦 DevStream inicializado!');
    };
  </script>
</body>
</html>
