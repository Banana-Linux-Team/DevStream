<!DOCTYPE html>
<head>
  <title>DevStream</title>
<style>
  .logoenome {
    display:flex;
    background-color:#303134;
    color: #5b8def;
    align-items: center;
    gap: 0.8rem;
    text-align: center;
    border-radius: 0;
	  font-weight: bold;
    cursor: pointer;
  }
  .logoenome p {
    color: white;
    font-weight: bold;
    margin-left: auto;
    margin-right: 20px;
  }
  body {
    background-color: black;
    color: white;
    margin: 0 auto;
    font-family: Inter;
    min-height: 100vh;
  }
  button {
    background-color:#9ab8f5;
    color: #303134;
    border: none;
    border-radius: 0;
    display: flex;
    font-weight: bold;
    align-items: center;
    cursor: pointer;
  }
  button:hover {
    background-color: #5b8def;
    color: #303134;
  }
  .sidebar {
    display: flex;
    width: 100%;
    background-color: #303134;
    height: 100%;
    align-items: center;
    z-index: 999;
    top: 0;
    left: 0;
    border-radius: 0;
    gap: 10px;
    padding: 5px 10px;
    position: sticky;
    top: 0;
  }
	.sidebar button {
		background-color: #303134;
		color: white;
    padding: 8px 15px;
	}
	.sidebar button:hover {
		background-color: #444;
		color: white;
	}
  a {
    background-color: #303134;
    border: 2px solid grey;
    border-radius: 10px;
    color: white;
  }
  .janeladecriarconta {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #303134;
    padding: 30px;
    border-radius: 10px;
    border: 2px solid #5b8def;
    width: 90%;
    min-width: 500px;
    min-height: 200px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 8px #5b8def;
    z-index: 1000;
  }
  .janeladecriarconta button {
    display: block;
    width: 100%;
    margin: 10px 0;
    background: transparent;
	color: white;
  }
  .janeladecriarconta button:hover {
    background: #444;
  }
  .janelapostarvideos {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #303134;
    padding: 30px;
    border-radius: 10px;
    border: 2px solid #5b8def;
    text-align: center;
    width: 90%;
    min-width: 500px;
    min-height: 200px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 8px #5b8def;
    z-index: 1000;
  }
  .janeladecriarconta h2 {
    color: #303134;
    text-align: center;
  }
  .janelapostarvideos button {
    display: block;
    width: 100%;
    margin: 10px 0;
    background: transparent;
	  color: white;
  }
  .janelapostarvideos button:hover {
    background: #444;
  }
  .janelapostarvideos h2 {
    color: #303134;
  }
  ::selection {
    background-color: #5b8def;
    color: white;
  }
  .Nome {
    background: linear-gradient(to right, #5b8def 50%, #9ab8f5 50%);
    background-clip: text;
    color: transparent;
    -webkit-background-clip: text;
  }
  ::-webkit-scrollbar-thumb {
    background-color: #5b8def;
  }
  ::-webkit-scrollbar-thumb:hover {
    background-color:#9ab8f5;
  }
  ::-webkit-scrollbar-track {
    background-color: grey;
  }
  input {
    background-color: white;
    border: 2px solid #5b8def;
    border-radius: 10px;
    padding: 10px;
    color: white;
    width: 50%;
    background-color: #000000;
  }
  input::placeholder {
	  color: white;
  }
  input label {
    color: white;
  }
  .Novosvideos {
    color: #9ab8f5;
  }
  textarea {
    border: 2px solid #5b8def;
    border-radius: 10px;
    width: 50%;
    background-color: #000000;
    color: white;
    resize: none;
  }
  textarea::placeholder {
	  color:white;
  }
  p {
	  color:white;
  }
  .Novosvideos {
	  text-align: center;
    padding: 10px;
  }
  textarea:focus{
	  outline: none;
  }
  input:focus {
	  outline: none;
	  color: white;
  }
  .carddosvideos {
	  color: white;
	  border-radius: 10px;
	  background-color: #303134;
	  padding: 10px 3px;
	  display: none;
    margin: 10px auto;
    max-width: 800px;
  }
  .carddosvideos:hover {
	  background-color: #323232;
  }
  #player {
	  width: 100%;
	  max-width: 800px;
	  margin: 20px auto;
  }
  #player iframe {
	  color: white;
	  border-radius: 10px;
	  width: 100%;
	  height: 450px;
	  border: 2px solid #5b8def;
}
	.logoenome h1 {
	  -webkit-text-stroke: 2px #000000;
	}
	::-webkit-scrollbar-thumb {
	  background-color: #5b8def;
	}
	textarea::-webkit-scrollbar-thumb {
		background: #5b8def;
	  }
  
  /* Estilos para os novos elementos */
  .video-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin: 10px 0;
    flex-wrap: wrap;
  }
  
  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 20px;
    background: transparent;
    color: #aaa;
    border: none !important;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
  }
  
  .action-btn:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }
  
  .action-btn.liked {
    color: #3ea6ff;
  }
  
  .action-btn.liked svg {
    fill: #3ea6ff;
  }
  
  .action-btn.disliked {
    color: #3ea6ff;
  }
  
  .action-btn.disliked svg {
    fill: #3ea6ff;
  }
  
  .action-btn svg {
    width: 24px;
    height: 24px;
    transition: all 0.3s;
  }
  
  .action-btn .like-count, .action-btn .dislike-count {
    font-size: 14px;
    color: #aaa;
  }
  
  .action-btn.liked .like-count,
  .action-btn.disliked .dislike-count {
    color: #3ea6ff;
  }
  
  .share-btn {
    background: transparent;
    border: none !important;
    color: #aaa;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    font-size: 14px;
  }
  
  .share-btn:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }
  
  .share-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
  }
  
  .comments-section {
    max-width: 800px;
    margin: 20px auto;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 1px solid #333;
  }
  
  .comments-section h3 {
    color: #9ab8f5;
    margin-bottom: 10px;
  }
  
  .comment-input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  
  .comment-input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #555;
    background: #222;
    color: white;
  }
  
  .comment-input-area button {
    padding: 10px 20px;
    border-radius: 20px;
    background: #5b8def;
    color: white;
    border: none;
    cursor: pointer;
  }
  
  .comment-input-area button:hover {
    background: #4a7adf;
  }
  
  .comment {
    padding: 10px;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 5px;
  }
  
  .comment .comment-user {
    color: #5b8def;
    font-weight: bold;
  }
  
  .comment .comment-text {
    color: #ddd;
    flex: 1;
  }
  
  .comment .comment-time {
    color: #666;
    font-size: 12px;
  }
  
  .coracao-svg {
    width: 24px;
    height: 24px;
    cursor: pointer;
    transition: all 0.3s;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }
  
  .action-btn.liked .coracao-svg {
    fill: #3ea6ff;
    stroke: #3ea6ff;
  }
  
  .coracao-svg:hover {
    transform: scale(1.1);
  }
  
  .carddosvideos .video-container {
    padding: 0 15px;
  }
  
  .carddosvideos .video-title {
    font-size: 18px;
    margin: 5px 0;
  }
  
  .carddosvideos .video-desc {
    color: #aaa;
    font-size: 14px;
    margin: 5px 0;
  }

  /* ========= PLAYER TELA INTEIRA ========= */
  #janelaplayer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #0a0a0a;
    z-index: 1000;
    padding: 0;
    margin: 0;
    border: none;
    border-radius: 0;
    transform: none;
    overflow-y: auto;
  }

  #janelaplayer::-webkit-scrollbar {
    width: 8px;
  }

  #janelaplayer::-webkit-scrollbar-thumb {
    background: #5b8def;
    border-radius: 4px;
  }

  #janelaplayer::-webkit-scrollbar-track {
    background: #1a1a1a;
  }

  /* Header do player (logo + nome) */
  .player-header {
    display: flex;
    align-items: center;
    background-color: #303134;
    padding: 10px 20px;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
    cursor: pointer;
    border-bottom: 2px solid #5b8def;
  }

  .player-header svg {
    width: 40px;
    height: 40px;
  }

  .player-header h1 {
    margin: 0;
    font-size: 24px;
    -webkit-text-stroke: 1px #000000;
  }

  .player-header .Nome {
    background: linear-gradient(to right, #5b8def 50%, #9ab8f5 50%);
    background-clip: text;
    color: transparent;
    -webkit-background-clip: text;
  }

  .player-header .fechar-player-btn {
    margin-left: auto;
    background: #5b8def !important;
    color: white !important;
    padding: 8px 20px !important;
    border-radius: 8px !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold;
  }

  .player-header .fechar-player-btn:hover {
    background: #4a7adf !important;
  }

  /* Conteúdo do player */
  .player-content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
  }

  .player-content #player {
    width: 100%;
    margin: 0 auto;
  }

  .player-content #player iframe {
    width: 100%;
    height: 60vh;
    border: 2px solid #5b8def;
    border-radius: 10px;
    min-height: 400px;
  }

  .player-interactions {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
    text-align: left;
  }

  .player-interactions .video-title {
    color: white;
    font-size: 22px;
    margin: 0 0 10px 0;
  }

  .player-interactions .video-desc {
    color: #aaa;
    font-size: 15px;
    margin: 0 0 15px 0;
  }

  .player-interactions .video-actions {
    justify-content: flex-start;
    margin: 10px 0 15px 0;
    gap: 8px;
  }

  .player-interactions .comments-section {
    margin: 10px 0 0 0;
    background: transparent;
    border: 1px solid #333;
    padding: 10px;
  }

  .player-interactions .comments-section h3 {
    color: #9ab8f5;
    font-size: 16px;
  }

  /* Responsivo */
  @media (max-width: 600px) {
    .player-content #player iframe {
      height: 40vh;
      min-height: 200px;
    }
    .player-header h1 {
      font-size: 18px;
    }
    .player-header .fechar-player-btn {
      padding: 6px 12px !important;
      font-size: 12px;
    }
    .janeladecriarconta, .janelapostarvideos {
      min-width: unset;
      width: 95%;
    }
    .comment {
      flex-direction: column;
      gap: 2px;
    }
    .player-content {
      padding: 10px;
    }
    .action-btn {
      padding: 6px 10px;
      font-size: 12px;
    }
    .action-btn svg {
      width: 20px;
      height: 20px;
    }
  }
</style>
</head>
<body>
  <header>
  <div class="logoenome" id="logoLink">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="64" height="64">
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#3b7bdd"/>
    </linearGradient>
  </defs>
  <path d="M 60 40 L 160 100 L 60 160 Z" fill="url(#playGrad)" stroke="#000000" stroke-width="4"/>
</svg>
  <h1><span class="Nome">DevStream</span></h1>
  <p>Olá, <span id="nomedousuario">  Visitante</span></p>
  </div>
  </header>
  <div class="sidebar">
    <button class="Início" id="btnInicio">Início</button>
    <button id="postarvideos" title="Postar um Vídeo">+ Postar vídeos</button>
    <button id="criarconta" title="Criar conta">Criar conta</button>
  </div>
  <div class="Novosvideos" id="conteudoPrincipal">
    <p>Vídeos postados a pouco tempo</p>
  </div>
  <div class="carddosvideos" id="modelodecard" style="display: none;">
    <div class="video-container">
      <h2 class="video-title">Titulo</h2>
      <p class="video-desc">Descrição</p>
      <button class="assistir-btn" style="margin: 10px auto; padding: 8px 20px; border-radius: 20px; background: #5b8def; color: white; border: none; cursor: pointer; display: block;">▶ Assistir</button>
    </div>
  </div>
  
  <div id="janeladecriarconta" class="janeladecriarconta">
    <h2>Criar conta</h2>
    <input type="text" id="nomedaconta" placeholder="Digite um nome para sua conta">
    <button onclick="criarConta()">Criar conta</button>
    <button onclick="fecharjaneladecriarconta()">fechar</button>
  </div>
  <div id="janeladobotaodepostarvideos" class="janelapostarvideos">
    <h2>Postar um video</h2>
    <input type="text" id="nomedovideo" placeholder="Escreva aqui o nome para o seu vídeo">
    <input type="text" id="linkparaovideo" placeholder="Link para o vídeo do Youtube">
    <textarea id="descrição" placeholder="Descrição" rows="4"></textarea>
    <button id="publicarvideo">Publicar vídeo</button>
    <button onclick="fecharjaneladobotaodepostarvideos()">Fechar</button>
  </div>
  
  <!-- PLAYER TELA INTEIRA -->
  <div id="janelaplayer">
    <!-- Header do player (logo + nome + fechar) -->
    <div class="player-header" id="playerLogoLink">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="40" height="40">
        <defs>
          <linearGradient id="playGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5b8def"/>
            <stop offset="100%" stop-color="#3b7bdd"/>
          </linearGradient>
        </defs>
        <path d="M 60 40 L 160 100 L 60 160 Z" fill="url(#playGrad2)" stroke="#000000" stroke-width="4"/>
      </svg>
      <h1><span class="Nome">DevStream</span></h1>
      <button class="fechar-player-btn" onclick="fecharPlayer()">✕ Fechar</button>
    </div>
    
    <div class="player-content">
      <div id="player"></div>
      <div class="player-interactions" id="player-interactions">
        <h2 class="video-title" id="titulodovideo">Título do Vídeo</h2>
        <p class="video-desc" id="descricaodovideo">Descrição do vídeo</p>
        <div class="video-actions">
          <button class="action-btn like-btn" id="like-btn">
            <svg class="coracao-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <span class="like-count" id="like-count">0</span>
          </button>
          <button class="action-btn dislike-btn" id="dislike-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3H9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 10H9V5h6v8zm4-1h2v-6h-2v6zM3 16h2v-6H3v6zm2 4h14v-2H5v2z"/>
              <path d="M12 14.5l-1.5 1.5L12 17.5l1.5-1.5L12 14.5z" transform="translate(0, 4)"/>
            </svg>
            <span class="dislike-count" id="dislike-count">0</span>
          </button>
          <button class="share-btn" id="share-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/>
              <circle cx="6" cy="12" r="3"/>
              <circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Compartilhar
          </button>
        </div>
        <div class="comments-section">
          <h3>💬 Comentários</h3>
          <div class="comment-input-area">
            <input type="text" placeholder="Escreva um comentário..." class="comment-input" id="comment-input">
            <button class="comment-submit" id="comment-submit">Comentar</button>
          </div>
          <div class="comments-list" id="comments-list"></div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // ========== FUNÇÕES DE INÍCIO ==========
    function irParaInicio() {
      // Fecha o player se estiver aberto
      if (document.getElementById('janelaplayer').style.display === 'block') {
        fecharPlayer();
      }
      // Fecha outras janelas
      document.getElementById('janeladecriarconta').style.display = 'none';
      document.getElementById('janeladobotaodepostarvideos').style.display = 'none';
      // Rola para o topo
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Clique na logo principal
    document.getElementById('logoLink').onclick = irParaInicio;

    // Clique na logo do player
    document.getElementById('playerLogoLink').onclick = function(e) {
      // Se clicou no botão de fechar, não faz nada
      if (e.target.classList.contains('fechar-player-btn')) return;
      irParaInicio();
    };

    // Botão Início da sidebar
    document.getElementById('btnInicio').onclick = irParaInicio;

    // ========== CRIAÇÃO DE CONTA ==========
    const criarconta = document.getElementById("criarconta");
    const janela = document.getElementById("janeladecriarconta");

    criarconta.onclick = function () {
      janeladecriarconta.style.display = "block";
    };

    function fecharjaneladecriarconta() {
      janeladecriarconta.style.display = "none";
    }
    function criarConta() { 
      const nome = document.getElementById('nomedaconta').value;
      if (nome) {
        document.getElementById('nomedousuario').textContent = nome;
        localStorage.setItem('nomedousuario', nome);
        const nomesalvo = localStorage.getItem('nomedousuario');
        document.getElementById('criarconta').style.display = 'none';
        alert('Conta criada Bem Vindo, ' + nome);
        fecharjaneladecriarconta();
      } else {
        alert('Digite um nome');
      }
    }
    window.onload = function() {
      const nomesalvo = localStorage.getItem('nomedousuario');
      if(nomesalvo) {
        document.getElementById('nomedousuario').textContent = nomesalvo;
        document.getElementById('criarconta').style.display = 'none';
      }
    }

    // ========== POSTAR VÍDEOS ==========
    const postarvideos = document.getElementById("postarvideos");
    const janelapostarvideos = document.getElementById("janeladobotaodepostarvideos");
    postarvideos.onclick = function () {
      janelapostarvideos.style.display = "block"
    };
    function fecharjaneladobotaodepostarvideos () {
      janelapostarvideos.style.display = "none"
    }
    
    document.getElementById('publicarvideo').onclick = function() {
      let nome = document.getElementById('nomedovideo').value;
      let link = document.getElementById('linkparaovideo').value;
      let desc = document.getElementById('descrição').value;
      
      if (nome === "" || link === "") {
        alert("Preencha tudo");
        return;
      }
      
      let modelo = document.getElementById('modelodecard');
      let NovoCard = modelo.cloneNode(true);
      NovoCard.style.display = "block";
      NovoCard.querySelector('.video-title').textContent = nome;
      NovoCard.querySelector('.video-desc').textContent = desc;
      
      let btnAssistir = NovoCard.querySelector('.assistir-btn');
      btnAssistir.onclick = function() {
        abrirPlayer(link, nome, desc);
      };
      
      document.querySelector('.Novosvideos').appendChild(NovoCard);
      
      document.getElementById('nomedovideo').value = '';
      document.getElementById('linkparaovideo').value = '';
      document.getElementById('descrição').value = '';
      fecharjaneladobotaodepostarvideos();
      
      alert("Vídeo publicado!");
    }

    // ========== PLAYER ==========
    let currentLink = '';
    let currentTitle = '';
    let currentDesc = '';
    let liked = false;
    let disliked = false;
    let likeCount = 0;
    let dislikeCount = 0;

    function abrirPlayer(link, titulo, desc) {
      currentLink = link;
      currentTitle = titulo;
      currentDesc = desc || '';
      
      let linkEmbed = converterParaEmbed(link);
      
      if (!linkEmbed.includes('?')) {
        linkEmbed += '?rel=0&modestbranding=1';
      } else {
        linkEmbed += '&rel=0&modestbranding=1';
      }
      
      // Mostrar player tela inteira
      document.getElementById('janelaplayer').style.display = 'block';
      document.getElementById('titulodovideo').textContent = titulo;
      document.getElementById('descricaodovideo').textContent = desc || 'Sem descrição';
      
      // Resetar like/dislike
      liked = false;
      disliked = false;
      likeCount = 0;
      dislikeCount = 0;
      document.getElementById('like-count').textContent = '0';
      document.getElementById('dislike-count').textContent = '0';
      document.getElementById('like-btn').classList.remove('liked');
      document.getElementById('dislike-btn').classList.remove('disliked');
      
      // Limpar comentários
      document.getElementById('comments-list').innerHTML = '';
      
      let playerDiv = document.getElementById('player');
      playerDiv.innerHTML = '';
      
      let iframe = document.createElement('iframe');
      iframe.src = linkEmbed;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      iframe.allowFullscreen = true;
      
      playerDiv.appendChild(iframe);
      
      // Impedir scroll do body
      document.body.style.overflow = 'hidden';
    }

    function fecharPlayer() {
      document.getElementById('janelaplayer').style.display = 'none';
      document.getElementById('player').innerHTML = '';
      document.body.style.overflow = 'auto';
    }

    // Fechar com ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        fecharPlayer();
      }
    });

    function converterParaEmbed(link){
      if(link.includes('watch?v=')){
        return link.replace('watch?v=','embed/');
      }
      if(link.includes('youtu.be/')){
        return 'https://www.youtube.com/embed/'+link.split('youtu.be/')[1];
      }
      return link;
    }

    // ========== LIKE / DISLIKE ==========
    document.getElementById('like-btn').onclick = function() {
      if (!liked) {
        liked = true;
        likeCount++;
        this.classList.add('liked');
        if (disliked) {
          disliked = false;
          dislikeCount--;
          document.getElementById('dislike-count').textContent = dislikeCount;
          document.getElementById('dislike-btn').classList.remove('disliked');
        }
        document.getElementById('like-count').textContent = likeCount;
      } else {
        liked = false;
        likeCount--;
        this.classList.remove('liked');
        document.getElementById('like-count').textContent = likeCount;
      }
    };

    document.getElementById('dislike-btn').onclick = function() {
      if (!disliked) {
        disliked = true;
        dislikeCount++;
        this.classList.add('disliked');
        if (liked) {
          liked = false;
          likeCount--;
          document.getElementById('like-count').textContent = likeCount;
          document.getElementById('like-btn').classList.remove('liked');
        }
        document.getElementById('dislike-count').textContent = dislikeCount;
      } else {
        disliked = false;
        dislikeCount--;
        this.classList.remove('disliked');
        document.getElementById('dislike-count').textContent = dislikeCount;
      }
    };

    // ========== COMPARTILHAR ==========
    document.getElementById('share-btn').onclick = function() {
      if (navigator.share) {
        navigator.share({
          title: currentTitle,
          text: currentDesc || 'Assista este vídeo no DevStream!',
          url: window.location.href
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert('Link copiado para a área de transferência!');
        }).catch(() => {
          alert('Compartilhe este vídeo: ' + window.location.href);
        });
      }
    };

    // ========== COMENTÁRIOS ==========
    document.getElementById('comment-submit').onclick = function() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) {
        const commentDiv = document.createElement('div');
        commentDiv.className = 'comment';
        const user = document.getElementById('nomedousuario').textContent || 'Anônimo';
        const time = new Date().toLocaleString();
        commentDiv.innerHTML = `
          <span class="comment-user">${user}</span>
          <span class="comment-text">${text}</span>
          <span class="comment-time">${time}</span>
        `;
        document.getElementById('comments-list').appendChild(commentDiv);
        input.value = '';
      }
    };

    document.getElementById('comment-input').onkeypress = function(e) {
      if (e.key === 'Enter') {
        document.getElementById('comment-submit').click();
      }
    };
  </script>
</body>
</html>
